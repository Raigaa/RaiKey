<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RaiKey</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="../../icons/icon-48.png" alt="Logo" class="logo">
      <h1>RaiKey</h1>
    </div>
    
    <div class="actions">
      <button id="detach-btn" class="btn btn-primary">
        <span class="text">Detach Tab</span>
        <span class="shortcut" id="detach-shortcut">...</span>
      </button>
      <button id="duplicate-btn" class="btn btn-primary" style="margin-top: 8px;">
        <span class="text">Duplicate Tab</span>
        <span class="shortcut" id="duplicate-shortcut">...</span>
      </button>
      <button id="quick-clean-btn" class="btn btn-primary" style="margin-top: 8px;">
        <span class="text">Quick Clean</span>
        <span class="shortcut" id="quick-clean-shortcut">...</span>
      </button>
    </div>

    <div class="footer">
      <button id="settings-btn" class="btn btn-icon">
        Settings
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
